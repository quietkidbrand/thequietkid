<!DOCTYPE html>
<html lang="en">
<head>

<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>The Quiet Kid — 8 Week Program</title>

<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{--black:#0a0a0a;--white:#f5f5f0;--grey:#888880;--mid:#1a1a1a;--border:#222220}
html{scroll-behavior:smooth}
body{background:var(--black);color:var(--white);font-family:'DM Sans',sans-serif;font-weight:300;min-height:100vh;overflow-x:hidden}

.cover{min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;text-align:center;padding:2rem;border-bottom:1px solid var(--border);position:relative}
.cover::before{content:'';position:absolute;inset:0;background:radial-gradient(ellipse at center,#161616 0%,transparent 65%);pointer-events:none}
.cover-tag{font-size:11px;letter-spacing:.3em;text-transform:uppercase;color:var(--grey);margin-bottom:2rem;border:1px solid var(--border);padding:.4rem 1.2rem;display:inline-block}
.cover-title{font-family:'Bebas Neue',sans-serif;font-size:clamp(5rem,18vw,14rem);line-height:.85;margin-bottom:1.5rem}
.cover-sub{font-size:.95rem;color:var(--grey);font-style:italic;margin-bottom:2.5rem;max-width:400px;line-height:1.8}
.cover-btn{padding:1rem 2.5rem;border:1px solid var(--white);color:var(--white);font-size:12px;letter-spacing:.2em;text-transform:uppercase;cursor:pointer;background:transparent;transition:all .2s;font-family:'DM Sans',sans-serif}
.cover-btn:hover{background:var(--white);color:var(--black)}

.overall-prog{padding:1.2rem 2rem;border-bottom:1px solid var(--border);background:var(--mid);display:none}
.overall-prog-title{font-size:10px;letter-spacing:.3em;text-transform:uppercase;color:var(--border);margin-bottom:.8rem}
.week-bubbles{display:flex;gap:6px;flex-wrap:wrap}
.week-bubble{width:34px;height:34px;border-radius:50%;border:1px solid var(--border);display:flex;align-items:center;justify-content:center;font-size:10px;color:var(--grey);cursor:pointer;transition:all .2s;font-family:'DM Sans',sans-serif}
.week-bubble.cur{border-color:var(--white);color:var(--white)}
.week-bubble.done{background:var(--border);color:var(--grey)}

.nav{position:sticky;top:0;z-index:100;background:rgba(10,10,10,.97);border-bottom:1px solid var(--border);padding:1rem 2rem;display:none;align-items:center;justify-content:space-between;backdrop-filter:blur(10px)}
.nav-logo{font-family:'Bebas Neue',sans-serif;font-size:1.3rem;letter-spacing:.1em}
.nav-weeks{display:flex;gap:4px;overflow-x:auto}
.nav-btn{padding:4px 10px;border:1px solid var(--border);background:transparent;color:var(--grey);font-size:10px;letter-spacing:.1em;cursor:pointer;font-family:'DM Sans',sans-serif;white-space:nowrap;transition:all .2s}
.nav-btn:hover,.nav-btn.active{border-color:var(--white);color:var(--white)}
.nav-btn.done{background:var(--border);color:var(--grey)}

.week-section{display:none;animation:fadeIn .4s ease}
.week-section.vis{display:block}
@keyframes fadeIn{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}

.w-header{padding:4rem 2rem 0;max-width:860px;margin:0 auto}
.w-num{font-size:11px;letter-spacing:.3em;text-transform:uppercase;color:var(--grey);margin-bottom:.4rem}
.w-title{font-family:'Bebas Neue',sans-serif;font-size:clamp(2.5rem,7vw,5rem);line-height:1;margin-bottom:1.2rem}
.w-intro{font-size:.88rem;line-height:1.85;color:var(--grey);font-style:italic;max-width:580px;padding-bottom:1.5rem;border-bottom:1px solid var(--border)}

.prog-wrap{max-width:860px;margin:0 auto;padding:1rem 2rem;display:flex;align-items:center;gap:1rem}
.prog-bar{flex:1;height:1px;background:var(--border);position:relative}
.prog-fill{position:absolute;left:0;top:0;bottom:0;background:var(--white);transition:width .4s ease}
.prog-lbl{font-size:11px;letter-spacing:.15em;color:var(--grey);white-space:nowrap}

.days-wrap{max-width:860px;margin:0 auto;padding:0 2rem 2rem}

.day-card{border-bottom:1px solid var(--border)}
.day-hdr{display:flex;align-items:center;gap:1rem;padding:1.6rem 0;cursor:pointer;user-select:none}
.day-icon{font-size:.9rem;color:var(--border);min-width:18px;text-align:center;transition:color .2s}
.day-card.exp .day-icon,.day-card.exp .day-n{color:var(--white)}
.day-n{font-family:'Bebas Neue',sans-serif;font-size:2.2rem;line-height:1;color:var(--border);min-width:46px;transition:color .2s}
.day-card.done-c .day-n,.day-card.done-c .day-name{color:var(--grey)}
.day-name{font-family:'Bebas Neue',sans-serif;font-size:1.3rem;letter-spacing:.04em;flex:1}
.day-st{font-size:10px;letter-spacing:.15em;text-transform:uppercase;color:var(--grey);margin-left:auto;white-space:nowrap}

.day-body{display:none;padding:0 0 2rem 64px}
.day-card.exp .day-body{display:block;animation:fadeIn .3s ease}

.day-q-block{font-style:italic;color:var(--grey);font-size:.88rem;line-height:1.7;padding:.8rem 1rem;border-left:2px solid var(--border);margin-bottom:1.3rem}
.blk{margin-bottom:1.2rem}
.blk-lbl{font-size:10px;letter-spacing:.3em;text-transform:uppercase;color:var(--border);margin-bottom:.4rem}
.blk-txt{font-size:.88rem;line-height:1.8}
.blk-txt.q{font-size:.92rem;font-weight:400}
.blk-txt.t{color:var(--grey)}
.blk-txt.ex{color:var(--grey);font-style:italic;background:var(--mid);padding:.7rem .9rem;border-left:1px solid var(--border);font-size:.83rem}

.notes-lbl{font-size:10px;letter-spacing:.3em;text-transform:uppercase;color:var(--border);margin-bottom:.4rem;margin-top:1.2rem}
.day-ta{width:100%;min-height:90px;background:var(--mid);border:1px solid var(--border);color:var(--white);font-family:'DM Sans',sans-serif;font-size:.85rem;line-height:1.7;padding:.7rem .9rem;resize:vertical;outline:none;transition:border-color .2s}
.day-ta:focus{border-color:var(--grey)}
.day-ta::placeholder{color:#282826}

.done-btn{margin-top:.8rem;padding:.5rem 1.1rem;border:1px solid var(--border);background:transparent;color:var(--grey);font-size:10px;letter-spacing:.2em;text-transform:uppercase;cursor:pointer;font-family:'DM Sans',sans-serif;transition:all .2s}
.done-btn:hover{border-color:var(--white);color:var(--white)}
.done-btn.yes{border-color:var(--grey);color:var(--white);background:var(--mid)}

.mid-quote{max-width:860px;margin:0 auto;padding:2rem;text-align:center;border-top:1px solid var(--border);border-bottom:1px solid var(--border);background:var(--mid)}
.mid-quote p{font-family:'Bebas Neue',sans-serif;font-size:clamp(1.2rem,3vw,1.8rem);letter-spacing:.05em;color:var(--grey)}

.w-summary{max-width:860px;margin:1rem auto 3rem;padding:2rem;border:1px solid var(--border);display:none}
.w-summary.vis{display:block}
.w-sum-lbl{font-size:10px;letter-spacing:.3em;text-transform:uppercase;color:var(--grey);margin-bottom:.8rem}
.w-sum-txt{font-size:.9rem;line-height:1.85;color:var(--grey);font-style:italic;margin-bottom:1.2rem}
.next-btn{padding:.6rem 1.4rem;border:1px solid var(--white);background:transparent;color:var(--white);font-size:10px;letter-spacing:.2em;text-transform:uppercase;cursor:pointer;font-family:'DM Sans',sans-serif;transition:all .2s}
.next-btn:hover{background:var(--white);color:var(--black)}

.footer{border-top:1px solid var(--border);padding:2.5rem 2rem;text-align:center}
.footer-q{font-family:'Bebas Neue',sans-serif;font-size:clamp(1.3rem,3vw,2rem);letter-spacing:.05em;margin-bottom:.3rem}
.footer-s{font-size:.8rem;color:var(--grey);font-style:italic}
.back-a{display:inline-block;margin-top:1.2rem;font-size:10px;letter-spacing:.2em;text-transform:uppercase;color:var(--grey);text-decoration:none;border:1px solid var(--border);padding:.45rem 1.1rem;transition:all .2s}
.back-a:hover{color:var(--white);border-color:var(--white)}

@media(max-width:600px){.day-body{padding-left:0}.nav-weeks{display:none}}
</style>
</head>

<div class="cover" id="cover">
  <div class="cover-tag">8-Week Program</div>
  <div class="cover-title">THE<br>QUIET<br>KID</div>
  <div class="cover-sub">For the ones who are still figuring it out. 56 days. One step at a time.</div>
  <button class="cover-btn" onclick="start()">Begin Week 1</button>
</div>

<nav class="nav" id="nav">
  <div class="nav-logo">TQK</div>
  <div class="nav-weeks" id="nav-weeks"></div>
</nav>

<div class="overall-prog" id="overall-prog">
  <div class="overall-prog-title">Your Progress</div>
  <div class="week-bubbles" id="bubbles"></div>
</div>

<div id="content"></div>

<div class="footer">
  <div class="footer-q">Don't you dare give up.</div>
  <div class="footer-s">— The Quiet Kid</div>
  <a href="https://quietkidbrand.github.io/thequietkid/" class="back-a">← Back to website</a>
</div>

<script>
const W=[
  {n:1,t:"Facing Your Problems",intro:"This is where it all begins. Before you can fix anything, you need to face it. Be honest with yourself — maybe for the first time in a long time. Each day has a thought, a question, a task, and a real example. Do them in order. Don't skip. Don't rush.",sum:"You made it through Week 1. That took courage. You faced your problems instead of running from them. Most people never even get this far. See you in Week 2.",mq:"The first step is always the hardest. But you already took it.",days:[
    {t:"Opening Up",ic:"◎",q:"The hardest step is the first one. But you already took it by being here.",qu:"Write down everything that is bothering you right now. Don't filter. Don't think too much. Just write.",ta:"Take a piece of paper or open your notes app. Write down at least 5 problems currently in your life. They can be big or small. Nobody will see this except you.",ex:"Example: 'I feel lonely. I fight with my mom every day. I can't focus in school. I don't know what I want to do with my life. I feel like nobody understands me.' — that's 5. Now write yours."},
    {t:"Going Deeper",ic:"↓",q:"The problem you avoid the most is usually the one that needs the most attention.",qu:"Which problem hurts you the most? Why does it hurt so much?",ta:"Take that one problem and write more about it. At least 10 sentences. Where did it come from? How long has it been going on?",ex:"Example: If your problem is loneliness — when did it start? Was it when you changed schools? When a friendship ended? Write exactly when and why it began."},
    {t:"Your Emotions",ic:"~",q:"Your emotions are not your weakness. Ignoring them is.",qu:"How do you feel today? Be honest — anger, sadness, loneliness, fear. Everything is okay.",ta:"Write down all the emotions you're feeling. Then next to each — why do you feel this way? What caused it? Don't judge yourself. Just be honest.",ex:"Example: 'Angry — because I feel like nobody listens to me. Sad — because I miss how things used to be. Scared — because I don't know what happens next.'"},
    {t:"The Pattern",ic:"⟳",q:"If the same thing keeps happening, it's not bad luck. It's a pattern. And patterns can be broken.",qu:"Do these problems keep repeating? Does the same thing happen over and over again?",ta:"Look back at days 1, 2 and 3. Do you see a pattern? Write down whether the same problems keep repeating and when they usually happen.",ex:"Example: 'Every time I get close to someone, I push them away. It happened with my last friend, my ex, and now my family. The pattern is that I shut down when I feel vulnerable.'"},
    {t:"The Honest Mirror",ic:"◻",q:"Sometimes you need to see yourself from the outside to understand what's happening on the inside.",qu:"If someone else looked at your life from the outside — what would they see?",ta:"Write about your life as if you were a stranger watching from outside. What would that person see? Think? Suggest?",ex:"Example: 'They would see a person who tries to act like everything is fine. Who smiles in public but goes quiet when alone. Who has potential but is scared to use it.'"},
    {t:"The First Step",ic:"→",q:"You don't have to fix everything today. You just have to take one small step forward every day.",qu:"What is one thing you could do differently starting tomorrow?",ta:"Choose one problem from this week. Write down three small things you can do starting tomorrow to make it smaller.",ex:"Example: Problem is bad sleep. Steps: 1) Phone away 30 min before bed. 2) Wake up same time every day. 3) No energy drinks after 6pm."},
    {t:"Look How Far You've Come",ic:"★",q:"You survived every bad day so far. That's a 100% success rate. Don't stop now.",qu:"Read everything you wrote this week. How do you feel now compared to day 1?",ta:"Read everything from day 1 to day 6. Then write: biggest thing you learned, what has already changed, what you're looking forward to.",ex:"Example: 'I learned that my biggest problem isn't school — it's that I don't feel good enough. That was hard to admit. But now I know what to actually work on.'"}
  ]},
  {n:2,t:"Understanding Your Problems",intro:"Before you can fix a problem, you need to understand it. This week you dig deeper — where did this come from? Is it your fault, someone else's, or both? Understanding the root is the first real step toward solving it.",sum:"Week 2 done. You now understand your problems on a level most people never reach. You know where they came from and why they're still here. That knowledge is power. Week 3 — we find solutions.",mq:"You can't solve what you don't understand. This week you understood.",days:[
    {t:"Where Did It Come From?",ic:"◎",q:"You can't fix a problem you don't understand. Understanding is the first act of courage.",qu:"Where did your biggest problem come from? Was there a specific moment when everything changed?",ta:"Write the history of your biggest problem. When did it start? What happened? Was there one moment that changed everything?",ex:"Example: 'My anxiety started when my parents separated at 13. I started overthinking everything. That fear of being abandoned never went away.'"},
    {t:"Who Is Responsible?",ic:"↓",q:"Blaming others keeps you stuck. Taking responsibility sets you free.",qu:"Is this problem your fault, someone else's, or both? Be completely honest.",ta:"Write honestly — who is responsible? Don't defend anyone. Just be honest. Taking responsibility means you're ready to change.",ex:"Example: 'My trust issues — 50% is because people hurt me, 50% is because I never let anyone in. Both are true. Both need work.'"},
    {t:"How Does It Affect You?",ic:"~",q:"A problem ignored doesn't disappear. It grows. Facing it is the only way out.",qu:"How does this problem affect your everyday life? Your mood, your relationships, your energy?",ta:"Write at least 5 specific examples of how this problem has changed your life.",ex:"Example: '1) I cancel plans because I'm anxious. 2) I can't sleep before important days. 3) I snap at people I love. 4) I avoid situations where I might fail. 5) I feel exhausted even when I haven't done anything.'"},
    {t:"What Have You Already Tried?",ic:"⟳",q:"Every failed attempt is not a failure. It's proof that you tried. And trying is everything.",qu:"What have you already tried to fix this problem? What worked and what didn't?",ta:"Write down everything you've already tried. What worked? What didn't? Why?",ex:"Example: 'I tried ignoring it — got worse. I tried talking to someone — helped a little but I stopped. I tried staying busy — just distracted me.'"},
    {t:"What Is It Teaching You?",ic:"◻",q:"Every problem carries a lesson. The ones who find it come out stronger on the other side.",qu:"What has this problem taught you about yourself so far?",ta:"Write down at least 3 things this problem has taught you.",ex:"Example: '1) I'm stronger than I thought — I'm still here. 2) I learned who my real friends are. 3) I learned that asking for help isn't weakness.'"},
    {t:"What Happens If Nothing Changes?",ic:"→",q:"The cost of staying the same is always higher than the cost of changing.",qu:"What does your life look like in 3 years if this problem stays exactly the same?",ta:"Write what your life looks like in 3 years with no change. Then write what it looks like if you solve this. The difference is your motivation.",ex:"Example: 'If nothing changes: still lonely, still avoiding life, still stuck. If I fix it: real connections, actually trying things, feeling like myself again.'"},
    {t:"You Understand Now",ic:"★",q:"Understanding your problem doesn't mean you've solved it. It means you're finally ready to.",qu:"After this week — do you understand your problem better than 7 days ago?",ta:"Write in one sentence — what is your problem, where did it come from, why is it still here. Then write one thing you now know that you didn't a week ago.",ex:"Example: 'My problem is that I don't believe I'm good enough, it came from years of comparison, and it's still here because I never challenged that belief. What I now know: the belief is a lie.'"}
  ]},
  {n:3,t:"Finding Solutions",intro:"Now that you understand your problems, it's time to put all possible solutions on the table. No idea is too big or too small. You'll explore every option and identify which ones actually fit your life.",sum:"Week 3 complete. You found your solutions. You made a plan. You made a promise to yourself. Now comes the hardest part — doing it. Week 4 starts tomorrow.",mq:"A solution you don't act on is just a thought. Next week — you act.",days:[
    {t:"All Options on the Table",ic:"◎",q:"Don't judge a solution before you try it. The one that seems impossible might be the one that changes everything.",qu:"What are all the possible solutions to your problem? Write every single one — even the ones that seem crazy.",ta:"Write down at least 10 possible solutions. Don't filter. Don't think about whether they're realistic.",ex:"Example: '1) Join a club. 2) Message someone I lost touch with. 3) Go somewhere public every day. 4) Therapy. 5) Online communities. 6) Volunteer. 7) Be honest with friends I have. 8) Stop canceling plans. 9) Put phone down. 10) Ask someone to hang out first.'"},
    {t:"Which Solution Fits You?",ic:"↓",q:"Not every solution works for every person. Find what fits you, not what worked for someone else.",qu:"Looking at your list — which solutions are actually realistic for your life right now?",ta:"Cross out everything that isn't realistic. Keep 3-5 solutions. Next to each write why it fits specifically you.",ex:"Example: 'Therapy — my school has a counselor. Stop canceling — I can do this tomorrow. Message someone old — easy, just scary. Those 3 are my focus.'"},
    {t:"The Obstacles",ic:"~",q:"Every solution has obstacles. Knowing them in advance means they can't stop you.",qu:"What is stopping you from implementing these solutions right now?",ta:"Next to each solution write what's stopping you. Fear? Money? Time? Be honest.",ex:"Example: 'Therapy — scared of what I'll find out. Stop canceling — fear of rejection. Message someone — scared they won't respond. Now I know what I'm dealing with.'"},
    {t:"Learn From Others",ic:"⟳",q:"You don't have to figure everything out alone. Someone has already walked the road you're on.",qu:"Do you know anyone who has solved a similar problem? What did they do?",ta:"Think of someone who had a similar problem and came out the other side. Write what they did. What can you learn?",ex:"Example: 'My cousin used to be isolated. He started going to the gym and met people there. He said: show up consistently, don't try to be perfect. I can apply that.'"},
    {t:"Choose One Solution",ic:"◻",q:"A good plan today is better than a perfect plan tomorrow. Pick one and start.",qu:"Out of all the solutions — which one feels most right to start with?",ta:"Choose ONE solution to start with. Write why you chose it. Write the first small step you can take within 24 hours.",ex:"Example: 'I'm starting with stopping canceling plans. It's in my control and I can do it immediately. First step: say yes to the next thing I'm invited to. No excuses.'"},
    {t:"Make a Plan",ic:"→",q:"A dream without a plan is just a wish. Write it down and make it real.",qu:"What does your plan look like? Step by step — what are you going to do and when?",ta:"Write a concrete plan. What will you do Monday? Tuesday? Next week? Write the steps in order.",ex:"Example: 'Monday — say yes to whatever comes up. Wednesday — message one old friend. Friday — go somewhere social for 30 minutes. Next week — do it again.'"},
    {t:"You Are Ready",ic:"★",q:"Knowing what to do and actually doing it are two different things. Next week, you act.",qu:"Do you feel more prepared than at the start of this week?",ta:"Write in one sentence — what is your solution and what is your first step. Read that sentence out loud. That is your promise to yourself.",ex:"Example: 'My solution is to stop isolating by saying yes instead of no — and my first step is tomorrow.' Say it out loud. Mean it."}
  ]},
  {n:4,t:"Testing Your Solutions",intro:"Knowing the solution is not enough. This week you take action — small steps. You will try, adjust, and try again. Progress is not perfection. Every small move forward counts.",sum:"Four weeks in. You faced your problems, understood them, found solutions, and started acting. You are already not the same person who started this. Week 5 — we work on who surrounds you.",mq:"Four weeks ago you didn't know where to start. Look at where you are now.",days:[
    {t:"The First Step",ic:"◎",q:"The moment you take the first step, everything changes. Don't wait. Start now.",qu:"Did you take the first step you promised yourself last week? If yes — how did it feel? If no — what stopped you?",ta:"Take that first step today. If you already did — write how it went. If you didn't — write what stopped you and do it now.",ex:"Example: 'I said I would message an old friend. I did it. They responded within an hour. We're meeting next week. That one message changed everything.'"},
    {t:"What Worked?",ic:"↓",q:"Progress is not always visible. But it's always there if you look closely enough.",qu:"What worked so far? Even the smallest win counts.",ta:"Write down everything that worked — even tiny things. Did you sleep better? Did one conversation go well? Did you feel lighter?",ex:"Example: 'I woke up on time 3 days in a row. I had one real conversation. I didn't cancel plans. Small things — but they're mine.'"},
    {t:"What Didn't Work?",ic:"~",q:"A setback is not the end. It's information. Use it.",qu:"What didn't work? What can you learn from it?",ta:"Write what didn't work and why. Don't blame yourself. Just analyze. What can you do differently?",ex:"Example: 'I tried going to bed early but my brain wouldn't stop. What I learned: I need to wind down 30 minutes first, not just lie there hoping for sleep.'"},
    {t:"Adjust the Plan",ic:"⟳",q:"Flexibility is not weakness. The strongest people know when to adjust.",qu:"Does your plan need to change based on what you've learned?",ta:"Look back at week 3's plan. Does it need changing? Write an updated version.",ex:"Example: 'Original plan: gym 5 days a week. Too much, burned out. New plan: 3 days, non-negotiable. Sustainable beats perfect.'"},
    {t:"Stay Consistent",ic:"◻",q:"Consistency beats perfection every single time. Show up even when you don't feel like it.",qu:"How do you stay consistent even on the days when you don't feel motivated?",ta:"Write down 3 things that help you stay consistent even when motivation is low.",ex:"Example: '1) Workout clothes next to my bed — no excuse. 2) I tell one person my plan — accountability. 3) I remember how I felt after the last time I showed up.'"},
    {t:"Ration Your Energy",ic:"→",q:"You can't pour from an empty cup. Protect your energy like it's your most valuable resource — because it is.",qu:"Are you taking care of yourself while working through this process?",ta:"Write how you're managing your energy. Sleep? Food? Rest? Write one thing you'll do for yourself starting tomorrow.",ex:"Example: 'I've been giving everyone my energy and leaving nothing for myself. Starting tomorrow: one hour a day that is only mine. No phone. No people. Just recharge.'"},
    {t:"Look How Far You've Come",ic:"★",q:"Four weeks ago you didn't even know where to start. Look at you now.",qu:"How are you different from the person who started this program?",ta:"Read through everything from week 1 to week 4. Write 3 changes you've already noticed — in thinking, behavior, or feelings.",ex:"Example: '1) I stopped pretending everything is fine. 2) I actually did something instead of just thinking about it. 3) I feel slightly less like I'm drowning. That's real progress.'"}
  ]},
  {n:5,t:"Relationships & Environment",intro:"The people around you and the environment you live in affect you more than you realise. This week you take an honest look at who helps you grow and who holds you back.",sum:"Week 5 complete. You looked at your circle honestly. That's rare. Most people never do it. Now you know who to keep close and what to change. Week 6 — we prepare you for when things go wrong.",mq:"You can't grow in an environment designed to keep you small.",days:[
    {t:"Who Is Around You?",ic:"◎",q:"You are the average of the five people you spend the most time with. Choose wisely.",qu:"Who are the five people you spend the most time with? How do they make you feel?",ta:"Write down 5 people. Next to each — does this person lift you up or pull you down?",ex:"Example: 'Friend 1 — lifts me up, always honest. Friend 2 — drains me, always drama. Parent — complicated. Classmate — neutral. Online friend — mostly positive.' Be this honest."},
    {t:"Who Helps You Grow?",ic:"↓",q:"The right people don't drain you. They fuel you. Keep them close.",qu:"Who in your life genuinely supports you and wants to see you grow?",ta:"Write down people who truly support you. Write why each person matters.",ex:"Example: 'My older cousin. She never judges me. She always asks the right questions. She celebrates my wins even when they're small. I need to call her more.'"},
    {t:"Who Holds You Back?",ic:"~",q:"Not everyone who is in your life deserves a front row seat. Some people belong in the back — or not there at all.",qu:"Is there anyone who constantly drains your energy or pulls you backwards?",ta:"Write honestly about people who hold you back. You don't have to cut them out — but you need to know who they are.",ex:"Example: 'There's someone who makes me feel small when I try new things. I'm not cutting them off but I'm done sharing my goals with them. Some people don't deserve that access.'"},
    {t:"Your Environment",ic:"⟳",q:"Your environment shapes your behavior more than your willpower does. Change your surroundings, change your life.",qu:"Does your physical environment support your growth?",ta:"Write one change you can make to your physical environment starting today.",ex:"Example: 'My room is a mess and it makes my brain feel like a mess. Today I'm cleaning my desk. Not the whole room — just the desk. Small change, real difference.'"},
    {t:"What Are You Consuming?",ic:"◻",q:"What you consume every day shapes who you become. Be intentional about what you let into your mind.",qu:"What kind of content are you consuming daily? Is it helping or keeping you stuck?",ta:"Write 3 accounts you'll stop following and 3 you'll start following that help you grow.",ex:"Example: 'I unfollowed 3 accounts that made me feel bad about myself. I followed 3 people doing what I want to do. My feed already feels different.'"},
    {t:"Set Your Boundaries",ic:"→",q:"Boundaries are not walls. They are the rules you set to protect your peace.",qu:"Where do you need stronger boundaries — with people, time, or yourself?",ta:"Write 3 boundaries you need to set. Next to each write how you'll apply it.",ex:"Example: '1) No phone after 10pm. 2) I stop explaining myself to people who don't listen. 3) I stop saying yes when I mean no.'"},
    {t:"Your Circle Is Your Future",ic:"★",q:"Surround yourself with people who remind you of who you're trying to become, not who you used to be.",qu:"After this week — what changes are you going to make?",ta:"Write the concrete changes. Who will you keep closer? Who will you distance yourself from? What will you change in your environment?",ex:"Example: 'Investing more in my cousin. Less energy to draining people. Cleaning my space. More intentional about who gets my time.'"}
  ]},
  {n:6,t:"Setbacks & Habits",intro:"Life will knock you down. The question is whether you get back up. This week you learn how to handle setbacks without losing everything you've built — and lock in the habits keeping you stable.",sum:"Six weeks in and you're still here. Most people quit long before this. You have a setback plan now. You have habits that hold you. Week 7 — we start looking forward.",mq:"You didn't come this far to stop here.",days:[
    {t:"Setbacks Are Normal",ic:"◎",q:"A setback is not a sign that you failed. It's a sign that you're trying. Keep going.",qu:"Have you experienced any setbacks since starting this program? How did they make you feel?",ta:"Write down all the setbacks you've experienced. Next to each — what did you learn from it?",ex:"Example: 'Week 3 I stopped doing the tasks for 4 days. I felt like a failure. What I learned: I wasn't failing — I was tired. Rest is part of the process.'"},
    {t:"How Do You React?",ic:"↓",q:"You can't always control what happens to you. But you can always control how you respond to it.",qu:"When something goes wrong — what is your first reaction?",ta:"Write how you usually react when things go wrong. Then write how you WANT to react.",ex:"Example: 'How I react: go quiet, pull away, tell myself it's pointless. How I want to react: take a breath, give myself one day, then get back up.'"},
    {t:"Create Your Setback Plan",ic:"~",q:"The people who survive the hardest moments are not the strongest. They are the most prepared.",qu:"What is your plan for when things get hard? What will you do instead of giving up?",ta:"Write your personal setback plan. Concrete steps you'll follow when things get hard.",ex:"Example: 'Step 1: Give myself 24 hours to feel bad — no judgment. Step 2: Do one small thing — make my bed, go outside. Step 3: Come back to this program and read Week 1.'"},
    {t:"Habits That Support You",ic:"⟳",q:"You don't rise to the level of your goals. You fall to the level of your habits. Build the right ones.",qu:"What daily habits have you built over the past weeks that are helping you move forward?",ta:"Write down all the habits you've built. Even small things count.",ex:"Example: 'I write every day — even one sentence. I go outside at least once. I don't pick up my phone first thing in the morning anymore.'"},
    {t:"Lock In Your Habits",ic:"◻",q:"A habit becomes permanent when you stop thinking about it and just do it. Keep showing up.",qu:"Which habits do you want to keep forever?",ta:"Choose 3 habits you want for life. Write why each is important and how you'll continue them after this program.",ex:"Example: '1) Writing every day — keeps me honest. 2) Going outside — keeps my head clear. 3) Saying no when I mean no — protects my energy. Non-negotiable now.'"},
    {t:"Who Are You Accountable To?",ic:"→",q:"Accountability is not a weakness. It's the secret weapon of every person who has ever achieved something great.",qu:"Is there someone you can be accountable to?",ta:"Write whether there's someone you can be accountable to. If not — write how you'll hold yourself accountable.",ex:"Example: 'I don't fully trust anyone with this yet. So I'm accountable to this journal. Every Sunday I read the week back. If I skipped something — I do it Sunday.'"},
    {t:"You Are Stronger Than You Think",ic:"★",q:"Six weeks in and you're still here. Most people quit long before this. You are not most people.",qu:"How have you handled setbacks differently this week?",ta:"Write 3 situations where you reacted to a setback better than before. If you can't find 3 — write 1.",ex:"Example: 'Someone said something that would have ruined my whole day before. This time I felt it for an hour and let it go. That's new. That's growth.'"}
  ]},
  {n:7,t:"Building Your Future",intro:"You are not the same person who started this program. Now it's time to look forward. Think about who you want to become and start building real plans. Your past does not define you. Your next move does.",sum:"Week 7 done. You have a vision. You have a plan. You have a promise to yourself. Tomorrow is the last week. The most powerful one. Be ready.",mq:"You spent 7 weeks fixing the foundation. Now it's time to build something on top of it.",days:[
    {t:"Who Do You Want to Be?",ic:"◎",q:"Your past explains where you came from. But it has absolutely nothing to do with where you're going.",qu:"Who do you want to become? Not what you want to have — who do you want to BE?",ta:"Write who you want to be in 3 years. Not what — who. How do you think? How do you act? How do you feel?",ex:"Example: 'I want to be someone who doesn't shrink in rooms. Who says what they think. Who helps people without losing themselves. Who wakes up without dreading the day.'"},
    {t:"Your Dreams",ic:"↓",q:"Your dreams are not too big. You just haven't started working on them yet.",qu:"What are your biggest dreams? The ones you've been too afraid to say out loud?",ta:"Write all your dreams — even the ones that seem impossible. Don't filter. Don't edit.",ex:"Example: 'I want to travel alone. I want to create something that matters. I want a family that actually talks to each other. I want to be proud of myself.'"},
    {t:"Break It Down",ic:"~",q:"A goal without a plan is just a dream. A plan without action is just words. Put them together and you have power.",qu:"Take your biggest dream — what are the steps to actually get there?",ta:"Choose your biggest dream. Write the steps starting from the end, working back to today.",ex:"Example: Dream: travel alone. Last step: book a flight. Before: save money. Before: get a job. First step today: update my CV. Start there."},
    {t:"Your Values",ic:"⟳",q:"When you know what you stand for, you stop falling for everything. Your values are your compass.",qu:"What are the values that define who you are and who you want to become?",ta:"Write 5 values most important to you. Next to each write why it's important.",ex:"Example: '1) Honesty — because I spent years pretending. 2) Loyalty — because I know what it's like when people leave. 3) Growth — because staying the same scares me more than change.'"},
    {t:"Obstacles on the Road",ic:"◻",q:"Every obstacle between you and your dream is just a problem waiting to be solved. You already know how to solve problems.",qu:"What are the biggest obstacles between you and the future you want?",ta:"Write all the obstacles. Then next to each — how will you overcome it?",ex:"Example: 'Obstacle: I don't believe I deserve good things. Solution: every day I write one thing I did right. Small evidence against the big lie.'"},
    {t:"Your Promise to Yourself",ic:"→",q:"The most important promise you will ever make is the one you make to yourself. Don't break it.",qu:"What do you promise yourself going forward? What will you never give up on?",ta:"Write a letter to your future self. What are you building? Why does it matter? What do you promise?",ex:"Example: 'I promise to keep going even when it's hard. I promise to be honest with myself. I promise not to let anyone convince me I'm not worth the effort.'"},
    {t:"Tomorrow Your Future Begins",ic:"★",q:"You came into this program as one person. You're leaving as another. The future belongs to the version of you that never gave up.",qu:"Looking back at everything — what is the most important thing this program has given you?",ta:"Write 7 things you've learned — one for each week. Tomorrow is week 8. Be ready.",ex:"Example: 'W1: I can face hard things. W2: I understand myself. W3: I can find solutions. W4: Small steps work. W5: Environment matters. W6: I can get back up. W7: I have a future.'"}
  ]},
  {n:8,t:"Read It Back",intro:"This is the most powerful moment of the program. You will go back to what you wrote in Week 1 and read it out loud. You will see, in your own words, how much you have changed. This is your proof.",sum:"You did it. Eight weeks. Fifty-six days. You showed up. That is everything. Don't you dare give up now. — The Quiet Kid",mq:"The person who started this program needed help. The person finishing it can give it.",days:[
    {t:"The Final Week Begins",ic:"◎",q:"You made it to week 8. Most people never even make it to week 2. That alone says everything about who you are.",qu:"How do you feel knowing this is your last week? What has changed since day 1?",ta:"Write how you feel today compared to day 1. At least 10 sentences.",ex:"Example: 'I feel different. Not fixed — different. Like I know myself better. Like I have tools I didn't have before. Like I'm not just waiting for things to get better anymore.'"},
    {t:"Read Week 1 Again",ic:"↓",q:"The person who wrote those words in week 1 was brave. But the person reading them now is even braver.",qu:"Read everything you wrote in week 1. What do you notice? What has changed?",ta:"Read your week 1 journal. Write 3 specific things that have changed from then to today.",ex:"Example: '1) The problems feel smaller — not gone, but smaller. 2) I don't feel as helpless reading them. 3) I can see exactly where each problem came from. That clarity is new.'"},
    {t:"Read Weeks 2 and 3 Again",ic:"~",q:"Look how far you've come. Not just in weeks — in wisdom, in strength, in understanding.",qu:"When you read about understanding your problem and finding solutions — do those feel different now?",ta:"Read your week 2 and 3 journals. Write what has changed.",ex:"Example: 'The solution I wrote in week 3 actually worked. Not perfectly — but it worked. That's evidence that trying is worth it.'"},
    {t:"Read Weeks 4 and 5 Again",ic:"⟳",q:"You didn't just change your habits. You changed your environment. That's one of the hardest things a person can do.",qu:"Looking back at your actions and environment — what decisions are you most proud of?",ta:"Read your week 4 and 5 journals. Write which decisions changed you the most.",ex:"Example: 'I'm most proud that I distanced myself from the person who was draining me. It was hard. But I feel lighter. That decision changed my daily mood.'"},
    {t:"Read Weeks 6 and 7 Again",ic:"◻",q:"You learned how to fall and get back up. And you built a future worth getting up for. That's everything.",qu:"When you read about setbacks and your future — does it feel real now?",ta:"Write one dream that now feels achievable that didn't feel that way in week 1.",ex:"Example: 'In week 1 I couldn't imagine being proud of myself. Now I can see a version of me that is. That version felt impossible 8 weeks ago. It doesn't anymore.'"},
    {t:"Write a Letter to Your Day 1 Self",ic:"→",q:"The person you were on day 1 needed someone to believe in them. Be that person for yourself now.",qu:"What would you say to the person you were on day 1?",ta:"Write a letter to your week 1 self. Tell them what you know now. Tell them it's worth it. Tell them not to give up.",ex:"Example: 'Dear me from 8 weeks ago — you were more broken than you admitted. But you were also braver than you knew. It gets clearer. Not easier — clearer. Keep going.'"},
    {t:"See Your Growth",ic:"★",q:"Don't you dare give up. The only person that can ruin your life is you. And the only person that can reach your dreams is also you.",qu:"Read everything you wrote on day 1. Then read everything you wrote today. Who are you now?",ta:"Take your week 1 day 1 writing — that list of problems. Read it out loud. Then read out loud who you are today. Feel the difference.",ex:"You don't need an example for this one. Just do it. Read it out loud. Feel it. That moment is yours."}
  ]}
];

let done={},notes={},cur=null;
try{done=JSON.parse(localStorage.getItem('qk3_done')||'{}')}catch(e){}
try{notes=JSON.parse(localStorage.getItem('qk3_notes')||'{}')}catch(e){}

function save(){try{localStorage.setItem('qk3_done',JSON.stringify(done));localStorage.setItem('qk3_notes',JSON.stringify(notes))}catch(e){}}
function prog(wn){let d=0;W[wn-1].days.forEach((_,i)=>{if(done[`${wn}-${i}`])d++});return{d,t:W[wn-1].days.length}}
function complete(wn){const p=prog(wn);return p.d===p.t}

function buildUI(){
  const nav=document.getElementById('nav-weeks');
  const bub=document.getElementById('bubbles');
  W.forEach(w=>{
    const b=document.createElement('button');
    b.className='nav-btn';b.id=`nb-${w.n}`;b.textContent=`W${w.n}`;b.onclick=()=>show(w.n);nav.appendChild(b);
    const bb=document.createElement('div');bb.className='week-bubble';bb.id=`bb-${w.n}`;bb.textContent=`W${w.n}`;bb.onclick=()=>show(w.n);bub.appendChild(bb);
  });
}

function updUI(){
  W.forEach(w=>{
    const nb=document.getElementById(`nb-${w.n}`);
    const bb=document.getElementById(`bb-${w.n}`);
    if(!nb)return;
    nb.className='nav-btn';bb.className='week-bubble';
    if(w.n===cur){nb.classList.add('active');bb.classList.add('cur');}
    else if(complete(w.n)){nb.classList.add('done');bb.classList.add('done');}
  });
}

function start(){show(1);}

function show(n){
  cur=n;
  document.getElementById('cover').style.display='none';
  document.getElementById('nav').style.display='flex';
  document.getElementById('overall-prog').style.display='block';
  updUI();render(n);window.scrollTo(0,0);
}

function render(n){
  const wk=W[n-1];
  const ct=document.getElementById('content');
  ct.innerHTML='';
  const sec=document.createElement('div');
  sec.className='week-section vis';

  // Header
  const hdr=document.createElement('div');
  hdr.className='w-header';
  hdr.innerHTML=`<div class="w-num">Week ${wk.n} of 8</div><div class="w-title">${wk.t}</div><div class="w-intro">${wk.intro}</div>`;
  sec.appendChild(hdr);

  // Progress
  const p=prog(n);
  const pw=document.createElement('div');
  pw.className='prog-wrap';
  pw.innerHTML=`<div class="prog-bar"><div class="prog-fill" id="pf" style="width:${(p.d/p.t)*100}%"></div></div><div class="prog-lbl" id="pl">${p.d}/${p.t} days complete</div>`;
  sec.appendChild(pw);

  // Days
  const dw=document.createElement('div');
  dw.className='days-wrap';

  wk.days.forEach((day,i)=>{
    if(i===4){
      const mq=document.createElement('div');
      mq.className='mid-quote';
      mq.innerHTML=`<p>${wk.mq}</p>`;
      dw.appendChild(mq);
    }
    const key=`${n}-${i}`;
    const isDone=done[key];
    const savedNote=notes[key]||'';
    const card=document.createElement('div');
    card.className=`day-card${isDone?' done-c':''}`;
    card.id=`dc-${n}-${i}`;
    card.innerHTML=`
      <div class="day-hdr" onclick="tog('${n}',${i})">
        <div class="day-icon">${day.ic}</div>
        <div class="day-n">${String(i+1).padStart(2,'0')}</div>
        <div class="day-name">${day.t}</div>
        <div class="day-st">${isDone?'✓ Done':'Open →'}</div>
      </div>
      <div class="day-body">
        <div class="day-q-block">${day.q}</div>
        <div class="blk"><div class="blk-lbl">Question</div><div class="blk-txt q">${day.qu}</div></div>
        <div class="blk"><div class="blk-lbl">Task</div><div class="blk-txt t">${day.ta}</div></div>
        <div class="blk"><div class="blk-lbl">Real Example</div><div class="blk-txt ex">${day.ex}</div></div>
        <div class="notes-lbl">Your Notes</div>
        <textarea class="day-ta" placeholder="Write your thoughts here..." oninput="sn('${key}',this.value)">${savedNote}</textarea>
        <button class="done-btn${isDone?' yes':''}" onclick="tc('${key}','${n}',this)">${isDone?'✓ Completed':'Mark as complete'}</button>
      </div>`;
    dw.appendChild(card);
  });
  sec.appendChild(dw);

  // Summary
  const sum=document.createElement('div');
  sum.className=`w-summary${complete(n)?' vis':''}`;
  sum.id='wsum';
  sum.innerHTML=`<div class="w-sum-lbl">Week ${n} Complete</div><div class="w-sum-txt">${wk.sum}</div>${n<8?`<button class="next-btn" onclick="show(${n+1})">Begin Week ${n+1} →</button>`:''}`;
  sec.appendChild(sum);
  ct.appendChild(sec);
}

function tog(wn,i){
  const c=document.getElementById(`dc-${wn}-${i}`);
  c.classList.toggle('exp');
  const st=c.querySelector('.day-st');
  const key=`${wn}-${i}`;
  st.textContent=c.classList.contains('exp')?'Close ↑':(done[key]?'✓ Done':'Open →');
}

function sn(key,val){notes[key]=val;save();}

function tc(key,wn,btn){
  done[key]=!done[key];save();
  const card=btn.closest('.day-card');
  const st=card.querySelector('.day-st');
  if(done[key]){card.classList.add('done-c');btn.classList.add('yes');btn.textContent='✓ Completed';st.textContent='✓ Done';}
  else{card.classList.remove('done-c');btn.classList.remove('yes');btn.textContent='Mark as complete';st.textContent='Open →';}
  const p=prog(parseInt(wn));
  const pf=document.getElementById('pf');const pl=document.getElementById('pl');
  if(pf)pf.style.width=`${(p.d/p.t)*100}%`;
  if(pl)pl.textContent=`${p.d}/${p.t} days complete`;
  const sum=document.getElementById('wsum');
  if(sum&&complete(parseInt(wn)))sum.classList.add('vis');
  updUI();
}

buildUI();
</script>
</body>
</html>
